# s0: SpikeLog Baseline 
variant:
  id: s0_spikelog_baseline
  name: SpikeLog Baseline
  type: snn
  description: "Original SpikeLog architecture — reproduce TKDE 2024 results"

model:
  architecture: spikelog_original
  embedding_dim: 300     # TF-IDF vector dimension
  hidden: 128            # SNN hidden size (layer1: 300→128)
  num_out: 32            # SNN output size (layer3: 64→32)
  snn_layers: 3          # number of LIF layers (300→128→64→32)
  v_threshold: 0.3       # hidden neuron threshold (original: random [0,1), avg~0.5)
  out_threshold: 0.1     # output neuron threshold (original uses 0.1, not 1.0)
  detach_reset: false    # allow gradients through spike reset (critical for learning)

training:
  batch_size: 64
  max_epoch: 50
  lr: 5.0e-4
