# BGL (Blue Gene/L) dataset — ~4.7M lines, fixed window grouping
# Matches SpikeLog (TKDE 2024) setup: fixed_window 100 events, chronological split 80/20
dataset:
  name: bgl
  log_file: BGL.log
  log_format: "<Label> <Id> <Date> <Code1> <Time> <Code2> <Component1> <Component2> <Level> <Content>"
  session_type: fixed_window      # was: sliding_window (time-based)
  anomaly_labels: per_line        # "-" = normal, else = anomaly
  fixed_window_size: 100          # 100 events per window (SpikeLog default)
  fixed_step_size: 100            # non-overlapping
  drain_depth: 3
  drain_st: 0.3
  drain_regex:
    - '(0x)[0-9a-fA-F]+'
    - '\d+.\d+.\d+.\d+'
    - '\d+'
  download_url: "https://zenodo.org/records/3227177/files/BGL.tar.gz"
  download_extract: tar

data:
  train_ratio: 0.8
  split_method: chronological     # SpikeLog splits raw data chronologically for BGL
