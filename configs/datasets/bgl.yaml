# BGL (Blue Gene/L) dataset — ~4.7M lines, sliding window grouping
dataset:
  name: bgl
  log_file: BGL.log
  log_format: "<Label> <Id> <Date> <Code1> <Time> <Code2> <Component1> <Component2> <Level> <Content>"
  session_type: sliding_window
  anomaly_labels: per_line   # "-" = normal, else = anomaly
  window_size_minutes: 5
  step_size_minutes: 1
  drain_depth: 3
  drain_st: 0.3
  drain_regex:
    - '(0x)[0-9a-fA-F]+'
    - '\d+.\d+.\d+.\d+'
    - '\d+'
  download_url: "https://zenodo.org/records/3227177/files/BGL.tar.gz"
  download_extract: tar

data:
  train_ratio: 0.7
