# HDFS dataset — ~11M lines, session grouping by BlockId
# Drain params + log_format match SorLog (tested & working)
dataset:
  name: hdfs
  log_file: HDFS.log
  log_format: "<Date> <Time> <Pid> <Level> <Component>: <Content>"
  session_type: block_id
  anomaly_labels: separate_file   # anomaly_label.csv
  label_file: anomaly_label.csv
  drain_depth: 5
  drain_st: 0.5
  drain_regex:
    - '(?<=blk_)[-\d]+'
    - '\d+\.\d+\.\d+\.\d+'
    - '(/[-\w]+)+'
  download_url: "https://zenodo.org/records/3227177/files/HDFS_1.tar.gz"
  download_extract: tar

data:
  train_ratio: 0.3
