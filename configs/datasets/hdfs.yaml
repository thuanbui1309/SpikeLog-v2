# HDFS dataset — first 10M lines, session grouping by BlockId
# Matches SpikeLog (TKDE 2024) setup: 10M lines, block_id sessions, max 20 events/block
dataset:
  name: hdfs
  log_file: HDFS.log
  log_format: "<Date> <Time> <Pid> <Level> <Component>: <Content>"
  session_type: block_id
  anomaly_labels: separate_file   # anomaly_label.csv
  label_file: anomaly_label.csv
  sample_lines: 10000000          # first 10M lines (SpikeLog uses 10M, not full 11M)
  max_session_events: 20          # keep last N events per block (SpikeLog: window_size=20)
  drain_depth: 5
  drain_st: 0.5
  drain_regex:
    - '(?<=blk_)[-\d]+'
    - '\d+\.\d+\.\d+\.\d+'
    - '(/[-\w]+)+'
  download_url: "https://zenodo.org/records/3227177/files/HDFS_1.tar.gz"
  download_extract: tar

data:
  train_ratio: 0.8
  split_method: shuffle           # SpikeLog shuffles HDFS sessions before split
  min_seq_len: 5                  # filter very short blocks

training:
  lr: 1.0e-4        # lower LR for HDFS — many anomaly sessions cause high gradient variance
  patience: 20
