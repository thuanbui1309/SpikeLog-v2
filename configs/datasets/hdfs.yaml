# HDFS dataset — ~11M lines, session grouping by BlockId
dataset:
  name: hdfs
  log_file: HDFS.log
  log_format: "<Date> <Time> <Pid> <Level> <Component>: <Content>"
  session_type: block_id
  anomaly_labels: separate_file   # anomaly_label.csv
  label_file: anomaly_label.csv
  drain_depth: 5
  drain_st: 0.5
  drain_regex:
    - '(?<=blk_)[-\d]+'
    - '\d+\.\d+\.\d+\.\d+'
    - '(/[-\w]+)+'
  download_url: "https://zenodo.org/records/3227177/files/HDFS_1.tar.gz"
  download_extract: tar

data:
  train_ratio: 0.7
  min_seq_len: 5    # filter very short blocks (1-4 events → degenerate spikes)

training:
  lr: 1.0e-4        # lower than default 5e-4 — HDFS has 16K anomaly sessions vs BGL's ~4.5K, higher gradient variance
  patience: 20      # more patience — larger dataset needs longer to stabilize
