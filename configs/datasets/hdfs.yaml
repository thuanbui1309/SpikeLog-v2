# HDFS dataset configuration
dataset:
  name: hdfs
  log_file: HDFS.log
  log_format: "<Date> <Time> <Pid> <Level> <Component>: <Content>"
  session_type: block_id
  anomaly_labels: separate_file   # anomaly_label.csv
  label_file: anomaly_label.csv
  drain_depth: 5
  drain_st: 0.3
  drain_max_child: 120
  drain_regex:
    - "blk_(|-)[0-9]+"
    - "(/|)([0-9]+\\.){3}[0-9]+(:[0-9]+|)(:|)"
    - "(?<=[^A-Za-z0-9])(\\-?\\+?\\d+)(?=[^A-Za-z0-9])|[0-9]+$"
  download_url: "https://zenodo.org/records/8196385/files/HDFS_v1.tar.gz"
  download_extract: tar.gz

data:
  train_ratio: 0.3
