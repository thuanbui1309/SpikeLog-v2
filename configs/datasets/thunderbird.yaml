# Thunderbird dataset — ~211M lines, sliding window grouping
# Drain params + log_format match SorLog (tested & working)
dataset:
  name: thunderbird
  log_file: Thunderbird.log
  log_format: "<Label> <Id> <Date> <Admin> <Month> <Day> <Time> <AdminAddr> <Content>"
  session_type: sliding_window
  anomaly_labels: per_line   # "-" = normal, else = anomaly
  sample_lines: 20000000     # sample first 20M of 211M total lines
  window_size_minutes: 1
  step_size_minutes: 0.5
  drain_depth: 3
  drain_st: 0.3
  drain_max_child: 1000
  drain_regex:
    - '(0x)[0-9a-fA-F]+'
    - '\d+\.\d+\.\d+\.\d+'
    - '(?<=Warning: we failed to resolve data source name )[\w\s]+'
    - '\d+'
  download_url: "https://zenodo.org/records/3227177/files/Thunderbird.tar.gz"
  download_extract: tar

data:
  train_ratio: 6000     # absolute count: first 6000 normal sessions
