# Thunderbird dataset — first 10M lines, fixed window grouping
# Matches SpikeLog (TKDE 2024) setup: 10M lines, fixed_window 100 events, chronological split
dataset:
  name: thunderbird
  log_file: Thunderbird.log
  log_format: "<Label> <Id> <Date> <Admin> <Month> <Day> <Time> <AdminAddr> <Content>"
  session_type: fixed_window      # was: sliding_window (time-based)
  anomaly_labels: per_line        # "-" = normal, else = anomaly
  sample_lines: 10000000          # first 10M lines (SpikeLog uses 10M, not 20M)
  fixed_window_size: 100          # 100 events per window (SpikeLog default)
  fixed_step_size: 100            # non-overlapping
  drain_depth: 3
  drain_st: 0.3
  drain_max_child: 1000
  drain_regex:
    - '(0x)[0-9a-fA-F]+'
    - '\d+\.\d+\.\d+\.\d+'
    - '(?<=Warning: we failed to resolve data source name )[\w\s]+'
    - '\d+'
  logadempirical_dir: data/logadempirical  # pre-parsed from zenodo/8115559 (matches paper)
  download_url: "https://zenodo.org/records/3227177/files/Thunderbird.tar.gz"
  download_extract: tar

data:
  train_ratio: 0.8
  split_method: chronological     # SpikeLog splits raw data chronologically for TDB
