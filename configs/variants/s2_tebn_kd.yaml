# Hướng A: TEBN + Cosine KD from s1
# TEBN: Temporal Effective BN (NeurIPS 2022) — per-timestep rescaling, foldable
# Cosine KD: matches direction not magnitude — fixes MSE representation mismatch
variant:
  id: s2_tebn_kd
  name: SpikeLog + SDSA + TEBN (Cosine KD)
  type: snn
  description: "SDSA + TEBN + cosine KD from s1 — neuromorphic via BN folding"

model:
  architecture: spikelog_sdsa
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: tebn
  bias: true
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false

training:
  lr: 1.0e-4
  grad_clip: 1.0
  max_epoch: 80
  patience: 20
  scheduler: plateau
  scheduler_patience: 3
  min_lr: 1.0e-6
  bn_freeze_epoch: 15

distillation:
  enabled: true
  teacher_variant: s1_spikelog_sdsa
  alpha: 0.5
  loss_type: cosine
