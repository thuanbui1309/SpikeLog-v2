# s2.1: SpikeLog + SDSA + tdBN + Distillation from s1 (LayerNorm teacher)
# tdBN: Threshold-Dependent Batch Normalization (Zheng et al., AAAI 2021)
# Teacher (s1) guides tdBN student toward LayerNorm-quality representations
variant:
  id: s2_1_spikelog_bspn_distill
  name: SpikeLog + SDSA + tdBN (distilled)
  type: snn
  description: "SDSA + tdBN + distillation from s1 — neuromorphic via BN folding"

model:
  architecture: spikelog_sdsa
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: tdbn             # tdBN (neuromorphic via weight folding)
  bias: true             # train with bias, fold into LIF threshold for Lava export
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false

training:
  lr: 1.0e-4
  grad_clip: 1.0
  max_epoch: 80
  patience: 20
  scheduler: plateau
  scheduler_patience: 3
  min_lr: 1.0e-6
  bn_freeze_epoch: 5     # freeze BN after ep5 (prevents divergence, distill guides refinement)

distillation:
  enabled: true
  teacher_variant: s1_spikelog_sdsa
  alpha: 0.5             # L = (1-α)*L_task + α*L_distill

lava:
  enabled: true
  backend: slayer
