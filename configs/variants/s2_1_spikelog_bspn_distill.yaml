# s2.1: SpikeLog + SDSA + tdBN — primary neuromorphic variant
# tdBN: Threshold-Dependent Batch Normalization (Zheng et al., AAAI 2021)
# Provides centering + scaling during training, folds into weights for deployment
variant:
  id: s2_1_spikelog_bspn_distill
  name: SpikeLog + SDSA + tdBN
  type: snn
  description: "SDSA + tdBN — neuromorphic-compatible via BN folding, Lava deployable"

model:
  architecture: spikelog_sdsa
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: tdbn             # tdBN (neuromorphic via weight folding)
  bias: true             # train with bias, fold into LIF threshold for Lava export
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false

lava:
  enabled: true
  backend: slayer
