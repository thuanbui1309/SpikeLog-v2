# Hướng B: Progressive LN→BN (PRepBN) — no KD needed
# Reference: SLAB (ICML 2024), Decision SpikeFormer (CVPR 2025)
# Starts as LayerNorm (good accuracy), progressively transitions to BN (neuromorphic)
variant:
  id: s2_prepbn
  name: SpikeLog + SDSA + PRepBN
  type: snn
  description: "SDSA + progressive LN→BN — self-transitioning neuromorphic norm"

model:
  architecture: spikelog_sdsa
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: prepbn
  bias: true
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false

training:
  lr: 5.0e-4
  grad_clip: 1.0
  max_epoch: 80
  patience: 20
  scheduler: plateau
  scheduler_patience: 3
  min_lr: 1.0e-6
  # No bn_freeze_epoch — PRepBN manages its own transition
