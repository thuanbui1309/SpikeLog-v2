# RQ2 Ablation: Direct BSPN training (no KD, no conversion)
# Same as s2_spikelog_bspn but renamed for ablation table
variant:
  id: abl_direct_bspn
  name: "Ablation: Direct BSPN"
  type: snn
  description: "Direct BSPN training -- RQ2 ablation baseline"

model:
  architecture: spikelog_sdsa
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: bspn
  bias: false
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false
