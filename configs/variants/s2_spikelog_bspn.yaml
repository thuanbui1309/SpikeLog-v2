# s2: SpikeLog + SDSA + BSPN — primary neuromorphic variant
variant:
  id: s2_spikelog_bspn
  name: SpikeLog + SDSA + BSPN
  type: snn
  description: "SDSA + BSPN — fully neuromorphic-compatible, Lava deployable"

model:
  architecture: spikelog_sdsa
  embedding_dim: 300     # TF-IDF input dimension
  hidden: 128            # d_model
  layers: 2              # number of SDSA blocks
  attn_heads: 4
  norm: bspn             # BSPN (neuromorphic-compatible)
  bias: true             # train with bias, fold into LIF threshold for Lava export
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false

lava:
  enabled: true
  backend: slayer
