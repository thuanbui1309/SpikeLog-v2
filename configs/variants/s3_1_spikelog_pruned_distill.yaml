# s3.1: SpikeLog + SDSA + tdBN + Token Pruning — max energy efficiency
variant:
  id: s3_1_spikelog_pruned_distill
  name: SpikeLog + SDSA + tdBN + Pruning
  type: snn
  description: "SDSA + tdBN + dynamic token pruning — max energy efficiency"

model:
  architecture: spikelog_sdsa_pruned
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: tdbn             # tdBN (neuromorphic via weight folding)
  bias: true             # train with bias, fold into LIF threshold for Lava export
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false
  prune_after_layers: [1, 2]
  keep_ratio: 0.8

training:
  lr: 1.0e-4             # lower LR for BN stability with sparse SNN activations
  grad_clip: 1.0         # tighter clipping to prevent loss spikes
  max_epoch: 80          # more epochs since lower LR converges slower
  patience: 20           # longer patience for gradual convergence

lava:
  enabled: true
  backend: slayer
