# s3.1: SpikeLog + SDSA + BSPN + Pruning + Knowledge Distillation from s1
variant:
  id: s3_1_spikelog_pruned_distill
  name: SpikeLog + SDSA + BSPN + Pruning (distilled)
  type: snn
  description: "SDSA + BSPN + pruning — distilled from s1 (LayerNorm teacher)"

model:
  architecture: spikelog_sdsa_pruned
  embedding_dim: 300
  hidden: 128
  layers: 2
  attn_heads: 4
  norm: bspn
  bias: true              # fold into LIF threshold for Lava export
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false
  prune_after_layers: [1, 2]
  keep_ratio: 0.8

distillation:
  enabled: true
  teacher_variant: s1_spikelog_sdsa
  alpha: 0.5
  temperature: 1.0
  loss_type: repr

lava:
  enabled: true
  backend: slayer
