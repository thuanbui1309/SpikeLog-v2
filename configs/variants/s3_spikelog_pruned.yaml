# s3: SpikeLog + SDSA + BSPN + Token Pruning — reference
variant:
  id: s3_spikelog_pruned
  name: SpikeLog + SDSA + BSPN + Pruning
  type: snn
  description: "SDSA + BSPN + dynamic token pruning — max energy efficiency"

model:
  architecture: spikelog_sdsa_pruned
  embedding_dim: 300     # TF-IDF input dimension
  hidden: 128            # d_model
  layers: 2              # number of SDSA blocks
  attn_heads: 4
  norm: bspn             # BSPN (neuromorphic-compatible)
  bias: false            # no bias for neuromorphic
  tau: 2.0
  v_threshold: 0.3
  surrogate: atan
  detach_reset: false
  prune_after_layers: [1, 2]
  keep_ratio: 0.8        # keep 80% of events per pruning step

lava:
  enabled: true
  backend: slayer
